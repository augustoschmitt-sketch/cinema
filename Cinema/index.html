<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/estilo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema</title>
</head>
<body>

    <header>
        <h1 class="titulo">Questionário de Cinema</h1>
        <img src="images/fita.png" class="imagem">
    </header>

    <main>
        <section class="pergunta">
            <h2 class="subtitulo">Qual é a sua idade?</h2>
            <input id="idade" type="number" min="0" max="120" maxlength="3" placeholder="Digite algo">
        </section>

        <section class="pergunta">

            <h2 class="subtitulo2">Qual sua opinião em relação ao filme?</h2>
            <select id="nota">

                <option value="0">
                    Selecione uma nota
                </option>

                <option value="1">
                    Ótimo
                </option>

                <option value="2">
                    Bom
                </option>

                <option value="3">
                    Regular
                </option>

                <option value="4">
                    Ruim
                </option>

                <option value="5">
                    Péssimo
                </option>
        
        </select>

        </section>

        <div class="adicionar" id="btnAdicionar">Adicionar Dados</div>
        <div class="limpar" id="btnLimpar">Limpar</div>

        <div class="scroll">
            <p class="resultado" id="resultado">Esperando resultado...</p>
        </div>

    </main>

    <footer>
        <p>Obrigado por participar da pesquisa!</p>
    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
